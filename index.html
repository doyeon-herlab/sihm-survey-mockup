<script>
const TH=["구성원명|180","나이|70","응답일시|200","유증상 부위 / 판정|230","결과|80","삭제|70"];
document.getElementById("thead").innerHTML=TH.map((c,i)=>{const[t,w]=c.split("|");return `<th class="px-4 py-3 2xl:py-4 text-[11px] 2xl:text-[15px] font-medium text-[#ababab] tracking-wider border-t ${i<TH.length-1?'border-r':''} border-b border-[#dadee0]/70 bg-[#f6f8f6] w-[${w}px]"><div class="flex items-center w-full justify-center leading-tight">${t}</div></th>`;}).join("");

const P={pain:"text-[#ce4e1f] bg-[#ffedd5] border-[#ce4e1f]/30",mng:"text-[#4c9eeb] bg-[#d1e6fe] border-[#4c9eeb]/30"};
const rows=[
 {name:"홍길동",age:41,at:"2026-06-01 15:22",tags:[["무증상","ok"]]},
 {name:"김민준",age:30,at:"2026-06-10 09:14",tags:[["무증상","ok"]]},
 {name:"홍길동",age:41,at:"2026-06-12 10:30",tags:[["관리대상자(허리)","mng"]]},
 {name:"오세준",age:34,at:"2026-06-20 09:58",tags:[["통증호소자(팔)","pain"]]},
 {name:"홍길동",age:41,at:"2026-06-22 13:47",tags:[["통증호소자(허리)","pain"]]},
 {name:"이영희",age:38,at:"2026-06-23 16:05",tags:[["관리대상자(팔)","mng"]]},
 {name:"김민준",age:30,at:"2026-06-24 11:20",tags:[["관리대상자(목,어깨)","mng"]]},
];
rows.sort((a,b)=>a.at<b.at?-1:1);
const cnt={};rows.forEach(r=>{const k=r.name+"|"+r.age;cnt[k]=(cnt[k]||0)+1;});
const dupMark=r=>{const n=cnt[r.name+"|"+r.age];return n>1?`<span class="inline-flex items-center mr-1 align-middle text-[#b45309]" title="중복 의심 — 성명·나이·부서가 같은 응답이 ${n}건 있습니다. 동일인의 중복 제출 또는 동명이인일 수 있어 확인이 필요합니다."><svg viewBox="0 0 24 24" class="w-[13px] 2xl:w-[16px]"><path d="M3.9,12C3.9,10.29 5.29,8.9 7,8.9H11V7H7A5,5 0 0,0 2,12A5,5 0 0,0 7,17H11V15.1H7C5.29,15.1 3.9,13.71 3.9,12M8,13H16V11H8V13M17,7H13V8.9H17C18.71,8.9 20.1,10.29 20.1,12C20.1,13.71 18.71,15.1 17,15.1H13V17H17A5,5 0 0,0 22,12A5,5 0 0,0 17,7Z" style="fill:currentcolor"></path></svg><span class="ml-0.5 px-1.5 py-px rounded-full bg-[#fef3c7] text-[#b45309] text-[10px] 2xl:text-[12px] font-semibold border border-[#f0b429]/50">${n}</span></span>`:"";};
const pill=t=>`<span class="inline-block flex-shrink-0 px-3.5 py-1 rounded-full font-semibold border ${P[t[1]]}">${t[0]}</span>`;
const judge=tags=>tags.every(t=>t[1]==="ok")?'<span class="text-[#333333]">-</span>':`<div class="flex justify-center w-full gap-2">${tags.filter(t=>t[1]!=="ok").map(pill).join("")}</div>`;
const tdC="px-4 py-2 2xl:py-3 border-b text-center text-[11px] 2xl:text-[15px] text-[#333333] font-normal border-[#dadee0]/45";
document.getElementById("rows").innerHTML=rows.map(r=>`<tr class="hover:bg-[#e9eeeb] bg-[#f6f8f6]">
 <td class="${tdC} border-r whitespace-nowrap"><span class="inline-flex items-center justify-center">${dupMark(r)}${r.name}</span></td>
 <td class="${tdC} border-r">${r.age}</td>
 <td class="${tdC} border-r whitespace-nowrap" style="font-variant-numeric:tabular-nums">${r.at}</td>
 <td class="${tdC} border-r">${judge(r.tags)}</td>
 <td class="${tdC} border-r !px-0"><button class="flex hover:bg-gray-100 p-[4px] 2xl:p-[8px] mx-auto justify-center items-center text-[#48aa66] border-[#48aa66] rounded border bg-white" aria-label="결과"><svg viewBox="0 0 24 24" class="w-[20px] 2xl:w-[24px]"><path d="M5,4H19A2,2 0 0,1 21,6V18A2,2 0 0,1 19,20H5A2,2 0 0,1 3,18V6A2,2 0 0,1 5,4M5,8V12H11V8H5M13,8V12H19V8H13M5,14V18H11V14H5M13,14V18H19V14H13Z" style="fill:currentcolor"></path></svg></button></td>
 <td class="${tdC}"><button aria-label="삭제"><svg viewBox="0 0 24 24" class="text-gray-400 hover:text-[#e53e3e]" style="width:1.5rem;height:1.5rem"><path d="M9,3V4H4V6H5V19A2,2 0 0,0 7,21H17A2,2 0 0,0 19,19V6H20V4H15V3H9M7,6H17V19H7V6M9,8V17H11V8H9M13,8V17H15V8H13Z" style="fill:currentcolor"></path></svg></button></td>
</tr>`).join("");

const toggle='<button class="mr-1.5 p-0.5 rounded flex items-center justify-center border border-gray-300" style="width:16px;height:16px"><svg viewBox="0 0 24 24" class="text-[#838383]" style="width:.75rem;height:.75rem"><path d="M19,13H5V11H19V13Z" style="fill:currentcolor"></path></svg></button>';
const tnode=(label,pad,active,leaf)=>`<div class="flex w-full items-center py-2 2xl:py-[10px] px-2 2xl:px-[5px] rounded-md cursor-pointer text-[10.5px] 2xl:text-[13.97px] ${active?'bg-[#4fb26d1a] text-[#4fb26d] font-bold':'text-[#979797] hover:bg-[#00000008]'}" style="padding-left:${pad}px">${leaf?'<span style="width:10px;display:inline-block"></span>':toggle}<span class="select-none">${label}</span></div>`;
document.getElementById("tree").innerHTML=
 tnode("5. 보고서 테스트",5,true,false)+
 tnode("생산부",18,false,false)+
 tnode("생산1팀",31,false,true)+
 tnode("품질관리부",18,false,false)+
